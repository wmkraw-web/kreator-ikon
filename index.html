<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator Ikon PRO - EduBox AI</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        canvas { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Image: (<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>),
                Download: (<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>),
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Wand2: <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.21 1.21 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72ZM14 7l3 3M5 6v1M19 2v1M10 2v2M7 10H6M22 9h-2M15 2h1"/>,
                Type: (<><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>),
                Lock: (<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>),
                Key: <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5L15.5 7.5z"/>,
                HelpCircle: (<><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></>)
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- GUMKA DO TŁA ---
        const makeWhiteTransparent = (imageSrc) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d', { willReadFrequently: true });
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i], g = data[i+1], b = data[i+2];
                            if (r > 230 && g > 230 && b > 230) {
                                data[i+3] = 0; // Pełna przezroczystość
                            } else if (r > 200 && g > 200 && b > 200) {
                                data[i+3] = (255 - Math.max(r, g, b)) * 3; // Wygładzanie krawędzi
                            }
                        }
                        ctx.putImageData(imageData, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch(e) {
                        resolve(imageSrc); 
                    }
                };
                img.onerror = () => resolve(imageSrc);
                img.src = imageSrc;
            });
        };

        function App() {
            const canvasRef = useRef(null);
            
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [showInstructions, setShowInstructions] = useState(false);

            // Stan Kreatora
            const [iconMode, setIconMode] = useState('text'); // 'text' lub 'ai'
            const [iconText, setIconText] = useState('📁');
            const [bgColor, setBgColor] = useState('#818cf8');
            const [textColor, setTextColor] = useState('#ffffff');
            const [cornerRadius, setCornerRadius] = useState(100);

            // Stan AI
            const [aiPrompt, setAiPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [aiImageObj, setAiImageObj] = useState(null);
            const [aiError, setAiError] = useState(null);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { setIsPremium(true); setAccessCode(''); } 
                else { alert('Nieprawidłowy kod!'); }
            };

            // Rysowanie zaokrąglonego prostokąta
            const roundRect = (ctx, x, y, width, height, radius) => {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
            };

            // GŁÓWNA FUNKCJA RYSOWANIA NA PŁÓTNIE
            const drawCanvas = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const size = 512;
                canvas.width = size;
                canvas.height = size;

                // Czyszczenie tła
                ctx.clearRect(0, 0, size, size);

                // Rysowanie tła ikony
                ctx.fillStyle = bgColor;
                roundRect(ctx, 20, 20, size - 40, size - 40, cornerRadius);
                ctx.fill();

                // Cień i efekt wypukłości (opcjonalny)
                ctx.shadowColor = "rgba(0,0,0,0.1)";
                ctx.shadowBlur = 20;
                ctx.shadowOffsetY = 10;

                if (iconMode === 'text') {
                    ctx.fillStyle = textColor;
                    ctx.font = `bold 220px Montserrat`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    // Emoji wymagają nieco przesunięcia w pionie
                    ctx.fillText(iconText || '📁', size / 2, size / 2 + 15);
                } else if (iconMode === 'ai' && aiImageObj) {
                    // Rysowanie obrazka wyciętego z tła
                    ctx.drawImage(aiImageObj, 60, 60, size - 120, size - 120);
                }
            };

            // Przerysuj, gdy zmieni się stan
            useEffect(() => {
                drawCanvas();
            }, [iconMode, iconText, bgColor, textColor, cornerRadius, aiImageObj]);

            // GENEROWANIE GRAFIKI PRZEZ FAL.AI
            const handleGenerateAI = async () => {
                if (!aiPrompt.trim()) return;
                setIsGenerating(true); setAiError(null);
                
                let translatedPrompt = aiPrompt;
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(aiPrompt)}&langpair=pl|en`);
                    const data = await res.json();
                    if (data?.responseData?.translatedText && !data.responseData.translatedText.includes("MYMEMORY WARNING")) {
                        translatedPrompt = data.responseData.translatedText;
                    }
                } catch(e) {}

                // Modyfikator dla płaskiej ikony
                const fullPrompt = `${translatedPrompt}, modern app icon design, single object centered, flat vector style, isolated on pure white background, professional graphic, minimalist`;
                
                try {
                    // Uderzamy do naszego bezpiecznego API w Vercelu
                    const response = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: fullPrompt })
                    });

                    if (!response.ok) {
                        throw new Error("Błąd podczas łączenia z API w Vercelu. Sprawdź FAL_KEY.");
                    }

                    const data = await response.json();
                    
                    // Usuwamy tło z obrazka AI (Magiczna Gumka)
                    const transparentUrl = await makeWhiteTransparent(data.imageUrl);
                    
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.onload = () => {
                        setAiImageObj(img);
                        setIsGenerating(false);
                    };
                    img.src = transparentUrl;

                } catch (e) { 
                    setIsGenerating(false);
                    console.error(e);
                    setAiError("Błąd: Sprawdź ustawienia klucza API na Vercelu.");
                }
            };

            const downloadIcon = () => {
                const canvas = canvasRef.current;
                const link = document.createElement('a');
                link.download = `ikona_edubox_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Nawigacja Górna */}
                    <nav className="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3 font-black text-2xl tracking-tight">
                            <div className="bg-indigo-500 p-2.5 rounded-xl text-white shadow-lg"><Icon name="Image" size={24}/></div>
                            <span className="text-gray-800">Kreator<span className="text-indigo-600">Ikon</span> <span className="text-xs text-fuchsia-600 ml-1 font-bold bg-fuchsia-50 px-2 py-1 rounded-md border border-fuchsia-200">PRO AI</span></span>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button onClick={() => setShowInstructions(true)} className="flex items-center space-x-2 text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-xl font-bold transition-colors">
                                <Icon name="HelpCircle" size={20} /> <span className="hidden sm:inline">Jak używać?</span>
                            </button>
                            {!isPremium && (
                                <div className="flex items-center space-x-2 bg-gray-50 p-1.5 rounded-xl border border-gray-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium text-gray-700"/>
                                    <button onClick={handleVerifyCode} className="p-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg shadow-sm transition-colors"><Icon name="Key" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-yellow-900 px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all active:scale-95">
                                <Icon name="Coffee" size={20} /><span>{isPremium ? "Dzięki za Kawę!" : "Postaw Kawę"}</span>
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto px-4 py-12 grid grid-cols-1 lg:grid-cols-12 gap-10 w-full flex-grow">
                        
                        {/* PANEL BOCZNY */}
                        <div className="lg:col-span-5 space-y-6 flex flex-col">
                            
                            <div className="bg-white p-1.5 rounded-2xl shadow-sm border border-gray-100 flex gap-1">
                                <button onClick={() => setIconMode('text')} className={`flex-1 py-3 px-2 rounded-xl font-bold text-sm transition-all flex justify-center items-center gap-2 ${iconMode === 'text' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100/50' : 'text-gray-400 hover:bg-gray-50'}`}><Icon name="Type" size={18}/> Tekst / Emoji</button>
                                <button onClick={() => setIconMode('ai')} className={`flex-1 py-3 px-2 rounded-xl font-bold text-sm transition-all flex justify-center items-center gap-2 ${iconMode === 'ai' ? 'bg-purple-50 text-purple-700 shadow-sm border border-purple-100/50' : 'text-gray-400 hover:bg-gray-50'}`}><Icon name="Wand2" size={18}/> Grafika AI</button>
                            </div>

                            {/* Tryb TEKST */}
                            {iconMode === 'text' && (
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                                    <label className="font-bold text-gray-700 text-sm uppercase tracking-wider block">Co ma być na ikonie?</label>
                                    <input type="text" value={iconText} onChange={e => setIconText(e.target.value)} placeholder="Wpisz np. 'M', 'Matematyka' lub '🍎'" maxLength="20" className="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-indigo-400 text-lg font-bold text-center" />
                                </div>
                            )}

                            {/* Tryb AI */}
                            {iconMode === 'ai' && (
                                <div className="bg-gradient-to-br from-purple-50 to-white p-6 rounded-3xl shadow-sm border border-purple-100 space-y-4">
                                    <h2 className="font-bold text-purple-900 text-sm uppercase tracking-widest flex items-center"><Icon name="Wand2" size={18} className="mr-2 text-purple-500"/> Własna Grafika AI</h2>
                                    
                                    {!isPremium ? (
                                        <div className="text-center space-y-3 py-4">
                                            <div className="mx-auto w-12 h-12 bg-white rounded-full flex items-center justify-center text-purple-400 mb-2 shadow-sm"><Icon name="Lock" size={24} /></div>
                                            <p className="text-sm text-purple-700 font-medium">Funkcja dostępna z Kodem Premium (Postaw Kawę).</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <textarea value={aiPrompt} onChange={e => setAiPrompt(e.target.value)} placeholder="np. Otwarta książka, wesoła sowa, matematyczne cyfry..." className="w-full p-4 border border-purple-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-purple-100 bg-white resize-none" rows="2" />
                                            <button onClick={handleGenerateAI} disabled={isGenerating} className="w-full bg-purple-600 text-white px-4 py-4 rounded-xl font-bold shadow-md hover:bg-purple-700 disabled:bg-gray-400 transition-colors flex items-center justify-center space-x-2">
                                                {isGenerating ? <span>⏳ Rysowanie...</span> : <><Icon name="Wand2" size={18}/><span>Wygeneruj Grafikę</span></>}
                                            </button>
                                            {aiError && <div className="p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-xs text-center">{aiError}</div>}
                                            <p className="text-[10px] text-purple-500 text-center">Magiczna Gumka automatycznie usunie tło, aby obrazek idealnie pasował do ikony!</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Ustawienia Wyglądu */}
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-6">
                                <h2 className="font-bold text-gray-800 text-sm uppercase tracking-widest border-b pb-2">Wygląd Ikony</h2>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 uppercase block mb-1">Kolor Tła</label>
                                        <input type="color" value={bgColor} onChange={e => setBgColor(e.target.value)} className="w-full h-12 rounded-xl cursor-pointer bg-gray-50 p-1 border border-gray-200" />
                                    </div>
                                    <div className={iconMode === 'ai' ? 'opacity-30 pointer-events-none' : ''}>
                                        <label className="text-[10px] font-bold text-gray-400 uppercase block mb-1">Kolor Tekstu</label>
                                        <input type="color" value={textColor} onChange={e => setTextColor(e.target.value)} className="w-full h-12 rounded-xl cursor-pointer bg-gray-50 p-1 border border-gray-200" />
                                    </div>
                                </div>

                                <div>
                                    <div className="flex justify-between text-[10px] font-bold text-gray-400 mb-2 uppercase"><span>Zaokrąglenie rogów</span></div>
                                    <input type="range" min="0" max="256" value={cornerRadius} onChange={e => setCornerRadius(Number(e.target.value))} className="w-full accent-indigo-600 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                                </div>
                            </div>
                        </div>

                        {/* PANEL PODGLĄDU I POBIERANIA */}
                        <div className="lg:col-span-7 flex flex-col items-center justify-center space-y-8 bg-gray-50 rounded-[3rem] border-4 border-dashed border-gray-200 p-10 relative">
                            
                            {/* Podgląd Canvas */}
                            <div className="relative shadow-2xl rounded-3xl overflow-hidden bg-white">
                                <canvas ref={canvasRef} className="w-64 h-64 md:w-80 md:h-80 block"></canvas>
                            </div>

                            <button onClick={downloadIcon} className="bg-gray-900 hover:bg-gray-800 text-white px-10 py-5 rounded-2xl font-black text-lg tracking-widest flex items-center justify-center space-x-3 shadow-xl transition-all active:scale-95 w-full max-w-sm">
                                <Icon name="Download" size={24} /><span>POBIERZ (.PNG)</span>
                            </button>
                            <p className="text-gray-400 text-xs font-semibold text-center max-w-md">Pobrany plik .PNG to dziś uniwersalny standard ikon. Świetnie sprawdzi się na systemach Windows i w aplikacjach webowych.</p>
                        </div>
                    </div>

                    {/* MODAL Z INSTRUKCJĄ */}
                    {showInstructions && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-2xl max-h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col font-sans">
                                <div className="flex justify-between items-center p-6 border-b border-slate-100 bg-slate-50">
                                    <h2 className="text-xl font-black text-slate-800 flex items-center gap-2"><Icon name="HelpCircle" className="text-indigo-600"/> Instrukcja: Kreator Ikon</h2>
                                    <button onClick={() => setShowInstructions(false)} className="p-2 hover:bg-slate-200 rounded-xl transition-colors font-bold text-lg">✕</button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-4 text-sm text-gray-600">
                                    <p><strong>Czym jest ta aplikacja?</strong> Pozwala na stworzenie pięknych ikon folderów lub przedmiotów szkolnych z poziomu przeglądarki.</p>
                                    <ul className="list-disc pl-5 space-y-2">
                                        <li><strong>Tryb Tekst/Emoji:</strong> Wpisz pierwszą literę przedmiotu (np. "M" jak Matematyka) lub wklej ikonkę Emoji ze swojej klawiatury.</li>
                                        <li><strong>Tryb Grafika AI:</strong> Wpisz słowami, co chcesz mieć na ikonie (np. Globus). System połączy się z naszym szybkim serwerem, narysuje to, <strong>automatycznie wytnie tło</strong> za pomocą Magicznej Gumki i wklei w sam środek Twojej ikony! (Opcja Premium).</li>
                                        <li><strong>Kształt:</strong> Zmień zaokrąglenie suwakiem na dole. Przesuwając go do końca w lewo otrzymasz kwadrat, a w prawo - idealne koło!</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
