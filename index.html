<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Kreator Ikon PRO - EduBox AI</title>
    <!-- Biblioteki React i Tailwind z sieci -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        .checkerboard {
            background-image: repeating-linear-gradient(45deg, #f1f5f9 25%, transparent 25%, transparent 75%, #f1f5f9 75%, #f1f5f9), 
                              repeating-linear-gradient(45deg, #f1f5f9 25%, #ffffff 25%, #ffffff 75%, #f1f5f9 75%, #f1f5f9);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }

        .dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .dot { transform: translateX(100%); background-color: #7c3aed; }
        input:checked ~ .bg-toggle { background-color: #ddd6fe; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- IKONY SVG ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Image: (<><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>),
                Download: (<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>),
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Wand2: <path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.21 1.21 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72ZM14 7l3 3M5 6v1M19 2v1M10 2v2M7 10H6M22 9h-2M15 2h1"/>,
                Type: (<><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>),
                Lock: (<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>),
                Key: <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5L15.5 7.5z"/>,
                Windows: (<><path d="M3 12L3 4.5L10.5 3.5L10.5 12L3 12Z"/><path d="M11.5 3.5L21 2L21 12L11.5 12L11.5 3.5Z"/><path d="M3 13L10.5 13L10.5 20.5L3 19.5L3 13Z"/><path d="M11.5 13L21 13L21 22L11.5 20.5L11.5 13Z"/></>),
                Eraser: <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21H7Z"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- KONWERTER PNG DO ICO ---
        const convertToICO = async (canvas) => {
            return new Promise((resolve) => {
                const offCanvas = document.createElement('canvas');
                offCanvas.width = 256; offCanvas.height = 256;
                const offCtx = offCanvas.getContext('2d');
                offCtx.drawImage(canvas, 0, 0, 256, 256);

                offCanvas.toBlob((blob) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const pngData = new Uint8Array(e.target.result);
                        const pngSize = pngData.length;
                        const buffer = new ArrayBuffer(6 + 16 + pngSize);
                        const view = new DataView(buffer);
                        view.setUint16(0, 0, true); view.setUint16(2, 1, true); view.setUint16(4, 1, true);
                        view.setUint8(6, 0); view.setUint8(7, 0); view.setUint8(8, 0); view.setUint8(9, 0);
                        view.setUint16(10, 1, true); view.setUint16(12, 32, true); view.setUint32(14, pngSize, true); view.setUint32(18, 22, true);
                        const u8View = new Uint8Array(buffer); u8View.set(pngData, 22);
                        resolve(new Blob([buffer], { type: 'image/x-icon' }));
                    };
                    reader.readAsArrayBuffer(blob);
                }, 'image/png');
            });
        };

        // --- MAGICZNA GUMKA ---
        const processWithEraser = async (imageUrl) => {
            return new Promise(async (resolve) => {
                try {
                    const res = await fetch(imageUrl);
                    const blob = await res.blob();
                    const localUrl = URL.createObjectURL(blob);
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i], g = data[i+1], b = data[i+2];
                            if (r > 240 && g > 240 && b > 240) data[i+3] = 0;
                            else if (r > 210 && g > 210 && b > 210) data[i+3] = (255 - Math.max(r,g,b)) * 4;
                        }
                        ctx.putImageData(imageData, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                        URL.revokeObjectURL(localUrl);
                    };
                    img.src = localUrl;
                } catch (e) { resolve(imageUrl); }
            });
        };

        function App() {
            const canvasRef = useRef(null);
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [activeTab, setActiveTab] = useState('text');
            
            const [bgColor, setBgColor] = useState('#4f46e5');
            const [cornerRadius, setCornerRadius] = useState(140);
            const [iconText, setIconText] = useState('🎒');
            const [textColor, setTextColor] = useState('#ffffff');
            
            const [aiPrompt, setAiPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [aiImageObj, setAiImageObj] = useState(null);
            const [removeAiBg, setRemoveAiBg] = useState(true);

            const CANVAS_SIZE = 512;

            const redraw = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                
                ctx.save();
                ctx.beginPath();
                const r = cornerRadius;
                ctx.moveTo(r, 0); ctx.lineTo(512-r, 0); ctx.quadraticCurveTo(512, 0, 512, r);
                ctx.lineTo(512, 512-r); ctx.quadraticCurveTo(512, 512, 512-r, 512);
                ctx.lineTo(r, 512); ctx.quadraticCurveTo(0, 512, 0, 512-r);
                ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
                ctx.closePath();
                
                ctx.fillStyle = bgColor;
                ctx.fill();
                ctx.clip(); 

                if (activeTab === 'text') {
                    ctx.fillStyle = textColor; 
                    ctx.font = "bold 320px Arial";
                    ctx.textAlign = "center"; 
                    ctx.textBaseline = "middle";
                    ctx.fillText(iconText, 256, 275);
                } else if (aiImageObj) {
                    // IDEALNE CENTROWANIE I SKALA
                    const padding = 15; 
                    const drawSize = CANVAS_SIZE - (padding * 2);
                    const pos = (CANVAS_SIZE - drawSize) / 2;
                    ctx.drawImage(aiImageObj, pos, pos, drawSize, drawSize);
                }
                ctx.restore();
            };

            useEffect(() => { redraw(); }, [bgColor, cornerRadius, iconText, textColor, aiImageObj, activeTab]);

            const handleGenerate = async () => {
                if (!aiPrompt.trim()) return;
                setIsGenerating(true);
                
                let translated = aiPrompt;
                
                // 1. NIEZAWODNE TŁUMACZENIE GOOGLE
                try {
                    const transRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=pl&tl=en&dt=t&q=${encodeURIComponent(aiPrompt)}`);
                    if (transRes.ok) {
                        const transData = await transRes.json();
                        translated = transData[0][0][0];
                    }
                } catch(e) { console.log("Błąd tłumaczenia"); }

                // 2. MOCNY PROMPT (Bezwzględny przedmiot)
                const finalPrompt = `MAIN SUBJECT: ${translated}. STRICT INSTRUCTION: Draw exactly the main subject, do not replace it. STYLE: single object centered icon, professional flat vector art, isolated on pure white background, high quality, minimalist graphics.`;

                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: finalPrompt })
                    });
                    const data = await res.json();
                    let url = data.imageUrl;
                    if (removeAiBg) url = await processWithEraser(url);
                    
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.onload = () => { setAiImageObj(img); setIsGenerating(false); };
                    img.src = url;
                } catch (e) { setIsGenerating(false); alert("Błąd serwera AI."); }
            };

            const download = async (format) => {
                const canvas = canvasRef.current;
                const link = document.createElement('a');
                if (format === 'ico') {
                    const blob = await convertToICO(canvas);
                    link.href = URL.createObjectURL(blob);
                    link.download = `ikona_${Date.now()}.ico`;
                } else {
                    link.href = canvas.toDataURL('image/png');
                    link.download = `ikona_edubox_${Date.now()}.png`;
                }
                link.click();
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <nav className="bg-white border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm text-slate-800">
                        <div className="flex items-center space-x-3 font-black text-2xl tracking-tight">
                            <div className="bg-indigo-600 p-2.5 rounded-xl text-white shadow-lg"><Icon name="Image" size={24}/></div>
                            <span>Kreator<span className="text-indigo-600">Ikon</span> AI PRO</span>
                        </div>
                        <div className="flex items-center space-x-4">
                            {!isPremium && (
                                <div className="hidden sm:flex items-center space-x-2 bg-slate-100 p-1 rounded-xl">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod..." className="bg-transparent px-3 py-1.5 text-sm w-24 outline-none font-bold text-slate-600"/>
                                    <button onClick={() => { if(accessCode.toUpperCase()==="KAWA2024") setIsPremium(true); else alert("Błędny kod!"); }} className="bg-indigo-600 text-white p-2 rounded-lg"><Icon name="Key" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-xl font-bold shadow-sm flex items-center gap-2 active:scale-95 transition-all text-sm"><Icon name="Coffee" size={18} /><span>Postaw Kawę</span></button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto w-full p-6 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10 flex-grow items-start">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 flex gap-1">
                                <button onClick={() => setActiveTab('text')} className={`flex-1 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 ${activeTab === 'text' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100' : 'text-slate-400'}`}><Icon name="Type" size={18}/> Tekst / Emoji</button>
                                <button onClick={() => setActiveTab('ai')} className={`flex-1 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 ${activeTab === 'ai' ? 'bg-purple-50 text-purple-700 shadow-sm border border-purple-100' : 'text-slate-400'}`}><Icon name="Wand2" size={18}/> Kreator AI</button>
                            </div>

                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 space-y-8">
                                {activeTab === 'text' ? (
                                    <div className="space-y-6">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Ikona (Znak / Emoji)</label>
                                        <input type="text" value={iconText} onChange={e => setIconText(e.target.value)} maxLength="2" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-6xl outline-none focus:border-indigo-400 transition-colors" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Kolor znaku</label>
                                                <input type="color" value={textColor} onChange={e => setTextColor(e.target.value)} className="w-full h-12 rounded-xl cursor-pointer border-none p-1 bg-slate-50 shadow-inner" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Kolor tła</label>
                                                <input type="color" value={bgColor} onChange={e => setBgColor(e.target.value)} className="w-full h-12 rounded-xl cursor-pointer border-none p-1 bg-slate-50 shadow-inner" />
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {!isPremium ? (
                                            <div className="p-8 bg-purple-50 border-2 border-dashed border-purple-100 rounded-3xl text-center space-y-3 shadow-inner">
                                                <div className="mx-auto w-12 h-12 bg-white rounded-full flex items-center justify-center text-purple-400 shadow-sm"><Icon name="Lock" size={24}/></div>
                                                <p className="text-sm font-bold text-purple-800 uppercase tracking-widest leading-tight">Generator AI wymaga<br/>Kodu Premium</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-5">
                                                <textarea value={aiPrompt} onChange={e => setAiPrompt(e.target.value)} placeholder="Co narysować? np. Plecak, globus, sowa..." className="w-full p-5 border-2 border-purple-100 rounded-2xl text-sm outline-none resize-none focus:border-purple-400 transition-all h-28" />
                                                
                                                <div className="flex items-center justify-between bg-purple-50 p-4 rounded-2xl border border-purple-100 shadow-inner">
                                                    <div className="flex items-center gap-3">
                                                        <div className="bg-white p-2 rounded-lg shadow-sm text-purple-600"><Icon name="Eraser" size={20}/></div>
                                                        <div className="text-[10px] font-black text-purple-900 uppercase leading-none">Magiczna Gumka<br/><span className="text-purple-500 font-medium lowercase italic">Usuń białe tło AI</span></div>
                                                    </div>
                                                    <label className="relative inline-flex items-center cursor-pointer">
                                                        <input type="checkbox" className="sr-only" checked={removeAiBg} onChange={() => setRemoveAiBg(!removeAiBg)} />
                                                        <div className="bg-toggle w-12 h-7 bg-slate-200 rounded-full shadow-inner"></div>
                                                        <div className="dot absolute left-1 top-1 bg-white w-5 h-5 rounded-full shadow-md"></div>
                                                    </label>
                                                </div>

                                                <button onClick={handleGenerate} disabled={isGenerating} className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-5 rounded-3xl font-black text-sm uppercase tracking-widest shadow-xl shadow-purple-200 transition-all flex items-center justify-center gap-3 active:scale-95 disabled:grayscale">
                                                    {isGenerating ? "⏳ TŁUMACZENIE I RYSOWANIE..." : <><Icon name="Wand2" size={20}/><span>Generuj Ikonę AI</span></>}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                <div className="pt-8 border-t border-slate-100 space-y-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Zaokrąglenie tła</label>
                                        <span className="text-xs font-bold text-indigo-600">{Math.round(cornerRadius/2.56)}%</span>
                                    </div>
                                    <input type="range" min="0" max="256" value={cornerRadius} onChange={e => setCornerRadius(Number(e.target.value))} className="w-full accent-indigo-600 h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-7 flex flex-col items-center justify-center space-y-12">
                            <div className="relative group transition-transform duration-500 hover:scale-[1.02]">
                                <div className="checkerboard p-8 rounded-[4.5rem] shadow-2xl border-8 border-white bg-white relative z-10 overflow-hidden">
                                    <canvas ref={canvasRef} width="512" height="512" className="w-64 h-64 md:w-[420px] md:h-[420px] block drop-shadow-2xl"></canvas>
                                </div>
                                <div className="absolute -inset-4 bg-indigo-500/10 blur-3xl rounded-full -z-10 animate-pulse"></div>
                            </div>

                            <div className="flex flex-col sm:flex-row gap-4 w-full max-w-lg">
                                <button onClick={() => download('png')} className="flex-1 bg-white text-slate-800 border-2 border-slate-100 py-5 rounded-3xl font-black text-sm tracking-widest flex items-center justify-center gap-3 shadow-md hover:bg-slate-50 active:scale-95">
                                    <Icon name="Download" size={22} className="text-indigo-600"/><span>Pobierz PNG</span>
                                </button>
                                <button onClick={() => download('ico')} className="flex-1 bg-slate-900 text-white py-5 rounded-3xl font-black text-sm tracking-widest flex items-center justify-center gap-3 shadow-2xl hover:bg-slate-800 active:scale-95 relative overflow-hidden uppercase">
                                    <div className="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-[8px] font-black px-3 py-1 rounded-bl-xl uppercase tracking-tighter">Windows</div>
                                    <Icon name="Windows" size={22} className="text-yellow-400"/><span>System .ICO</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
