<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator Ikon AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- KONFIGURACJA PREMIUM ---
        const PREMIUM_SECRET_CODE = "KAWA2024";
        const BUY_COFFEE_LINK = "https://buycoffee.to/magiccolor"; 

        // --- IKONY SVG ---
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconType = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>;
        const IconCoffee = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/></svg>;
        const IconKey = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5L15.5 7.5z"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconPalette = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.688-1.688h1.906c3.11 0 5.625-2.515 5.625-5.625 0-4.75-4.477-8.75-10-8.75z"/></svg>;

        // --- FUNKCJA EKSPORTU DO ICO ---
        const convertToICO = async (canvas) => {
            return new Promise((resolve) => {
                const offCanvas = document.createElement('canvas');
                offCanvas.width = 256;
                offCanvas.height = 256;
                const offCtx = offCanvas.getContext('2d');
                offCtx.drawImage(canvas, 0, 0, 256, 256);

                offCanvas.toBlob((blob) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const pngData = new Uint8Array(e.target.result);
                        const pngSize = pngData.length;
                        
                        const buffer = new ArrayBuffer(6 + 16 + pngSize);
                        const view = new DataView(buffer);
                        
                        view.setUint16(0, 0, true);     
                        view.setUint16(2, 1, true);     
                        view.setUint16(4, 1, true);     
                        
                        view.setUint8(6, 0);            
                        view.setUint8(7, 0);            
                        view.setUint8(8, 0);            
                        view.setUint8(9, 0);            
                        view.setUint16(10, 1, true);    
                        view.setUint16(12, 32, true);   
                        view.setUint32(14, pngSize, true); 
                        view.setUint32(18, 22, true);   
                        
                        const u8View = new Uint8Array(buffer);
                        u8View.set(pngData, 22);
                        
                        resolve(new Blob([buffer], { type: 'image/x-icon' }));
                    };
                    reader.readAsArrayBuffer(blob);
                }, 'image/png');
            });
        };

        const App = () => {
            const canvasRef = useRef(null);
            
            const [activeTab, setActiveTab] = useState('text');
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');

            const [backgroundColor, setBackgroundColor] = useState('#4f46e5');
            const [borderRadius, setBorderRadius] = useState(128);
            const [iconSize, setIconSize] = useState(256);
            
            const [iconText, setIconText] = useState('🔥');
            const [textColor, setTextColor] = useState('#ffffff');
            const [fontFamily, setFontFamily] = useState('Arial');
            
            const [aiPrompt, setAiPrompt] = useState('Słodki czerwony lisek z puszystym ogonem, wektorowa płaska ikona');
            const [aiImage, setAiImage] = useState(null);
            
            // Nowe stany ładowania
            const [isGenerating, setIsGenerating] = useState(false);
            const [loadingText, setLoadingText] = useState('');
            const [errorMsg, setErrorMsg] = useState('');

            const CANVAS_SIZE = 512;

            useEffect(() => {
                redrawCanvas();
            }, [iconText, textColor, backgroundColor, borderRadius, iconSize, fontFamily, aiImage, activeTab]);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === PREMIUM_SECRET_CODE) {
                    setIsPremium(true);
                    setAccessCode('');
                } else {
                    alert('Nieprawidłowy kod. Postaw kawę autorowi, aby otrzymać dostęp!');
                }
            };

            const handleGenerateAI = async () => {
                if (!aiPrompt.trim()) return;
                
                setIsGenerating(true);
                setErrorMsg('');
                setLoadingText('Łączenie z serwerem AI...');
                
                // Dynamiczny tekst ładowania poprawiający wrażenia
                const messages = [
                    'Analizowanie opisu...',
                    'Szkicowanie kształtów...',
                    'Nakładanie kolorów...',
                    'Darmowe serwery są bardzo obciążone, prosimy o cierpliwość...',
                    'To potrwa jeszcze kilka sekund...'
                ];
                
                let step = 0;
                const intervalId = setInterval(() => {
                    if(step < messages.length) {
                        setLoadingText(messages[step]);
                        step++;
                    }
                }, 4000); // zmiana tekstu co 4 sekundy
                
                try {
                    const seed = Math.floor(Math.random() * 1000000);
                    const prompt = `${aiPrompt}, modern app icon design, single object centered, flat vector style, isolated on pure white background, professional graphic, minimalist`;
                    const encodedPrompt = encodeURIComponent(prompt);
                    
                    // Usunięto powolny model flux, przywrócono szybki standardowy
                    const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true&seed=${seed}`;
                    
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.onload = () => {
                        clearInterval(intervalId);
                        setAiImage(img);
                        setIsGenerating(false);
                    };
                    img.onerror = () => {
                        clearInterval(intervalId);
                        setErrorMsg("Serwer sztucznej inteligencji jest obecnie przeciążony. Spróbuj ponownie za chwilę.");
                        setIsGenerating(false);
                    };
                    img.src = imageUrl;

                } catch (error) {
                    clearInterval(intervalId);
                    console.error(error);
                    setErrorMsg("Wystąpił błąd sieci. Sprawdź połączenie.");
                    setIsGenerating(false);
                }
            };

            const redrawCanvas = () => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                ctx.save();
                ctx.beginPath();
                const r = borderRadius;
                ctx.moveTo(r, 0);
                ctx.lineTo(CANVAS_SIZE - r, 0);
                ctx.quadraticCurveTo(CANVAS_SIZE, 0, CANVAS_SIZE, r);
                ctx.lineTo(CANVAS_SIZE, CANVAS_SIZE - r);
                ctx.quadraticCurveTo(CANVAS_SIZE, CANVAS_SIZE, CANVAS_SIZE - r, CANVAS_SIZE);
                ctx.lineTo(r, CANVAS_SIZE);
                ctx.quadraticCurveTo(0, CANVAS_SIZE, 0, CANVAS_SIZE - r);
                ctx.lineTo(0, r);
                ctx.quadraticCurveTo(0, 0, r, 0);
                ctx.closePath();
                ctx.clip(); 

                if (activeTab === 'ai' && aiImage) {
                    ctx.drawImage(aiImage, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
                } else {
                    ctx.fillStyle = backgroundColor;
                    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                    ctx.fillStyle = textColor;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.font = `bold ${iconSize}px ${fontFamily}`;
                    
                    const textYOffset = (fontFamily.includes('Segoe UI Emoji') || fontFamily.includes('Apple Color Emoji')) ? iconSize * 0.1 : 0;
                    ctx.fillText(iconText, CANVAS_SIZE / 2, (CANVAS_SIZE / 2) + textYOffset);
                }

                ctx.restore(); 
            };

            const handleDownload = async (format) => {
                const canvas = canvasRef.current;
                if (!canvas) return;

                if (format === 'png') {
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `ikona_${Date.now()}.png`;
                    link.href = dataUrl;
                    link.click();
                } else if (format === 'ico') {
                    try {
                        const blob = await convertToICO(canvas);
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.download = `ikona_${Date.now()}.ico`;
                        link.href = url;
                        link.click();
                        URL.revokeObjectURL(url);
                    } catch (e) {
                        alert("Błąd podczas konwersji do ICO.");
                        console.error(e);
                    }
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Nawigacja */}
                    <nav className="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center space-x-3 font-black text-xl tracking-tight">
                            <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-2.5 rounded-xl text-white shadow-lg"><IconPalette /></div>
                            <span className="text-slate-800">Icon<span className="text-indigo-600">Generator</span></span>
                        </div>
                        <div className="flex items-center space-x-4">
                            {!isPremium && (
                                <div className="hidden sm:flex items-center space-x-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod dostępu..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium text-slate-700"/>
                                    <button onClick={handleVerifyCode} className="p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow-sm transition-colors"><IconKey /></button>
                                </div>
                            )}
                            <button onClick={() => window.open(BUY_COFFEE_LINK)} className="flex items-center space-x-2 bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-500 hover:to-yellow-600 text-yellow-900 px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all active:scale-95">
                                <IconCoffee /><span>{isPremium ? "Dzięki za Kawę!" : "Postaw Kawę"}</span>
                            </button>
                        </div>
                    </nav>

                    <div className="flex flex-col lg:flex-row flex-1 p-6 lg:p-12 gap-12 max-w-7xl mx-auto w-full">
                        {/* Panel sterowania */}
                        <div className="w-full lg:w-1/2 flex flex-col gap-6">
                            
                            {/* Zakładki */}
                            <div className="flex gap-2 p-1.5 bg-white rounded-2xl shadow-sm border border-slate-200">
                                <button onClick={() => setActiveTab('text')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all ${activeTab === 'text' ? 'bg-indigo-50 text-indigo-700 shadow-sm border border-indigo-100' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <IconType /> Tekst / Emoji
                                </button>
                                <button onClick={() => setActiveTab('ai')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all ${activeTab === 'ai' ? 'bg-purple-50 text-purple-700 shadow-sm border border-purple-100' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <IconSparkles /> Magia AI
                                </button>
                            </div>

                            <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-200 flex flex-col gap-6">
                                
                                {activeTab === 'text' && (
                                    <div className="space-y-6">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Ikona (Tekst lub Emoji)</label>
                                            <input 
                                                type="text" 
                                                value={iconText} 
                                                onChange={(e) => setIconText(e.target.value)} 
                                                className="w-full text-center text-4xl p-4 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 outline-none transition-colors"
                                                maxLength="3"
                                            />
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Kolor Tła</label>
                                                <input 
                                                    type="color" 
                                                    value={backgroundColor} 
                                                    onChange={(e) => setBackgroundColor(e.target.value)} 
                                                    className="w-full h-12 rounded-xl cursor-pointer border-0 p-1 bg-slate-50"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Kolor Tekstu</label>
                                                <input 
                                                    type="color" 
                                                    value={textColor} 
                                                    onChange={(e) => setTextColor(e.target.value)} 
                                                    className="w-full h-12 rounded-xl cursor-pointer border-0 p-1 bg-slate-50"
                                                />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Rodzina Czcionki</label>
                                            <select 
                                                value={fontFamily} 
                                                onChange={(e) => setFontFamily(e.target.value)}
                                                className="w-full p-3 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-medium"
                                            >
                                                <option value="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif">Emoji Systemowe</option>
                                                <option value="Arial, sans-serif">Arial</option>
                                                <option value="'Courier New', Courier, monospace">Monospace</option>
                                                <option value="'Times New Roman', Times, serif">Serif</option>
                                                <option value="'Comic Sans MS', cursive">Comic Sans</option>
                                            </select>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'ai' && (
                                    <div className="space-y-6">
                                        {!isPremium ? (
                                            <div className="bg-purple-50 p-6 rounded-2xl border border-purple-100 text-center space-y-4">
                                                <div className="bg-purple-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto text-purple-600">
                                                    <IconLock />
                                                </div>
                                                <h3 className="font-bold text-purple-900 text-lg">Funkcja Premium</h3>
                                                <p className="text-sm text-purple-700">Wprowadź kod Premium na górze strony, aby odblokować Generator AI. Możesz go zdobyć stawiając wirtualną kawę!</p>
                                                
                                                <div className="flex flex-col sm:flex-row items-center justify-center gap-2 mt-4 sm:hidden">
                                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Wpisz kod..." className="p-3 border border-purple-200 rounded-xl text-sm w-full outline-none"/>
                                                    <button onClick={handleVerifyCode} className="w-full p-3 bg-purple-600 text-white rounded-xl font-bold shadow-md">Odblokuj</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-4">
                                                <label className="block text-xs font-bold text-purple-600 uppercase tracking-widest mb-2">Opisz swoją ikonę</label>
                                                <textarea 
                                                    value={aiPrompt} 
                                                    onChange={e => setAiPrompt(e.target.value)} 
                                                    placeholder="np. Słodki czerwony lisek, minimalistyczna ikona..."
                                                    className="w-full p-4 border-2 border-purple-100 rounded-2xl focus:border-purple-500 outline-none resize-none h-24 text-sm"
                                                />
                                                <button 
                                                    onClick={handleGenerateAI} 
                                                    disabled={isGenerating}
                                                    className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-purple-200 hover:scale-[0.98] transition-all disabled:opacity-50 disabled:hover:scale-100"
                                                >
                                                    {isGenerating ? loadingText : <div className="flex items-center gap-2"><IconSparkles /> Stwórz Ikonę AI</div>}
                                                </button>
                                                {errorMsg && <p className="text-red-500 text-xs font-bold text-center mt-2">{errorMsg}</p>}
                                                <p className="text-[10px] text-slate-400 text-center">Wskazówka: AI automatycznie generuje ikony bez tła (wypełnia kształt na całej powierzchni płótna).</p>
                                            </div>
                                        )}
                                    </div>
                                )}

                                <hr className="border-slate-100"/>

                                {/* Slidery Wspólne */}
                                <div className="space-y-6">
                                    <div>
                                        <div className="flex justify-between mb-2">
                                            <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Zaokrąglenie rogów</span>
                                            <span className="text-xs font-bold text-indigo-600">{Math.round((borderRadius / (CANVAS_SIZE/2)) * 100)}%</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="0" 
                                            max={CANVAS_SIZE / 2} 
                                            value={borderRadius} 
                                            onChange={(e) => setBorderRadius(Number(e.target.value))} 
                                            className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                        />
                                    </div>
                                    
                                    {activeTab === 'text' && (
                                        <div>
                                            <div className="flex justify-between mb-2">
                                                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Wielkość elementu</span>
                                                <span className="text-xs font-bold text-indigo-600">{iconSize}px</span>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="48" 
                                                max="400" 
                                                value={iconSize} 
                                                onChange={(e) => setIconSize(Number(e.target.value))} 
                                                className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                            />
                                        </div>
                                    )}
                                </div>

                            </div>
                        </div>

                        {/* Podgląd i Pobieranie */}
                        <div className="w-full lg:w-1/2 flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-sm border border-slate-200 min-h-[500px]">
                            
                            <div className="mb-4 text-xs font-bold text-slate-400 uppercase tracking-widest text-center">Podgląd Ikony</div>
                            
                            {/* Płótno Canvas (Tło z szachownicą aby było widać przezroczystość na wyciętych rogach) */}
                            <div className="relative mb-12 group z-10 w-64 h-64 rounded-3xl shadow-2xl transition-transform duration-300 group-hover:scale-[1.02]" 
                                 style={{
                                     backgroundImage: 'repeating-linear-gradient(45deg, #f1f5f9 25%, transparent 25%, transparent 75%, #f1f5f9 75%, #f1f5f9), repeating-linear-gradient(45deg, #f1f5f9 25%, #ffffff 25%, #ffffff 75%, #f1f5f9 75%, #f1f5f9)',
                                     backgroundPosition: '0 0, 10px 10px',
                                     backgroundSize: '20px 20px'
                                 }}>
                                <canvas 
                                    ref={canvasRef} 
                                    width={CANVAS_SIZE} 
                                    height={CANVAS_SIZE} 
                                    className="w-full h-full bg-transparent drop-shadow-lg"
                                ></canvas>
                            </div>

                            <div className="flex flex-col sm:flex-row gap-4 w-full max-w-sm">
                                <button onClick={() => handleDownload('png')} className="flex-1 flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-6 py-4 rounded-xl font-bold shadow-lg transition-all hover:-translate-y-1">
                                    <IconDownload /> Pobierz PNG
                                </button>
                                <button onClick={() => handleDownload('ico')} className="flex-1 flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all hover:-translate-y-1 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 bg-yellow-400 text-yellow-900 text-[8px] font-black px-2 py-0.5 rounded-bl-lg uppercase">Windows</div>
                                    <IconDownload /> Pobierz ICO
                                </button>
                            </div>
                            
                            <p className="text-[10px] text-slate-400 text-center mt-6 max-w-xs">
                                Pliki <strong>.ICO</strong> są idealne do tworzenia własnych ikon folderów na systemie Windows.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
